name: 結果収集
on:
  schedule:
    - cron: '50 14 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 結果収集
      - run: node results.js
      - name: コミット
        run: |
          git config user.name "race-bot"
          git config user.email "actions@github.com"
          git add history.json stats.json
          git diff --cached --quiet || git commit -m "results update"
          git push
