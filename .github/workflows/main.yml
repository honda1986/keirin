name: 全レース更新
on:
  schedule:
    - cron: '30 21 * * *'
    - cron: '0 3 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: レース取得
        run: node fetch.js
      - name: コミット
        run: |
          git config user.name "race-bot"
          git config user.email "actions@github.com"
          git add races.json
          git diff --cached --quiet || git commit -m "races update"
          git push
