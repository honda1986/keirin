name: シミュレーター
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 学習
        run: node learn.js
      - name: バックテスト
        run: node simulate.js
      - name: コミット
        run: |
          git config user.name "race-bot"
          git config user.email "actions@github.com"
          git add sim.json weights.json
          git diff --cached --quiet || git commit -m "learn+sim update"
          git push
