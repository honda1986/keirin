name: 評価値
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: バックテスト
        run: node diagnose.js
      - name: コミット
        run: |
          git config user.name "race-bot"
          git config user.email "actions@github.com"
          git add sim.json
          git diff --cached --quiet || git commit -m "sim update"
          git push
