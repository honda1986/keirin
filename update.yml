name: 全レース更新
on:
  schedule:
    - cron: '30 21 * * *'   # 6:30 JST(朝の開催前)
    - cron: '0 3 * * *'     # 12:00 JST(昼)
    - cron: '0 8 * * *'     # 17:00 JST(ナイター前)
  workflow_dispatch:         # 手動実行も可能
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: レース取得
        run: node scripts/fetch.js
      - name: コミット
        run: |
          git config user.name "race-bot"
          git config user.email "actions@github.com"
          git add docs/races.json
          git diff --cached --quiet || git commit -m "races update $(date -u +%Y-%m-%dT%H:%M)"
          git push
